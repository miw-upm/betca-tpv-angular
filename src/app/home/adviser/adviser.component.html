<mat-grid-list cols="3" rowHeight="300px">
  <mat-grid-tile *ngFor="let article of articles">
    <mat-card>
      <mat-card-header>
        <mat-card-title>{{ article.description }}</mat-card-title>
        <mat-card-subtitle>{{ selectedTag }}</mat-card-subtitle>
      </mat-card-header>
      <mat-card-content>
        Price: {{ article.retailPrice | currency }}
      </mat-card-content>
      <mat-card-actions>
        <button mat-button (click)="addToBasket(article)">Add to Basket</button>
      </mat-card-actions>
    </mat-card>
  </mat-grid-tile>
</mat-grid-list>
