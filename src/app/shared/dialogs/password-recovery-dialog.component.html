<h3 mat-dialog-title>Password Recovery</h3>
<mat-dialog-content>
  <mat-form-field>
    <input [(ngModel)]="mobile" matInput placeholder="Mobile" type="text"/>
  </mat-form-field> <br>
  <mat-form-field>
    <input [(ngModel)]="email" matInput placeholder="Email" type="text"/>
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-button (click)="sendEmail()">Send Email</button>
</mat-dialog-actions>
