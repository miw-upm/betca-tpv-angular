<h1 mat-dialog-content>{{title}}</h1>
<mat-dialog-content>
  <ng-container *ngIf="(object | async) as data">
    <mat-label *ngFor="let def of labels(data)"><strong>{{def | uppercaseWords}}: </strong>{{data[def]}}</mat-label>
  </ng-container>
</mat-dialog-content>
<mat-dialog-actions *ngIf="(object | async) as data">
    <button mat-dialog-close mat-raised-button>Close</button>
    <button mat-raised-button (click)="print(data.reference)"><mat-icon>print</mat-icon> Print</button>
    <button mat-raised-button [disabled]="data.dateOfUse" (click)="consume(data.reference)"><mat-icon>redeem</mat-icon> Consume</button>
</mat-dialog-actions>
