<mat-card>
    <mat-card-content>
      <mat-label><strong>Filters: </strong></mat-label>
      <mat-form-field>
        <mat-label>Reference</mat-label>
        <input [(ngModel)]="vouchersSearch.reference" matInput>
      </mat-form-field>
      <button color="primary" disabled="disabled" mat-icon-button>
        <mat-icon>category</mat-icon>
      </button>
      <mat-form-field>
        <mat-label>User Mobile</mat-label>
        <input [(ngModel)]="vouchersSearch.userMobile" matInput>
      </mat-form-field>
      <button color="primary" disabled="disabled" mat-icon-button>
        <mat-icon>smartphone</mat-icon>
      </button>
      <mat-form-field>
        <mat-label>Creation Date</mat-label>
        <mat-date-range-input [rangePicker]="picker">7
          <input matStartDate placeholder="Start date" [(ngModel)]="vouchersSearch.startDate">
          <input matEndDate placeholder="End date" [(ngModel)]="vouchersSearch.endDate">
        </mat-date-range-input>
        <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
        <mat-date-range-picker #picker></mat-date-range-picker>
        <mat-hint align="start">Range</mat-hint>
      </mat-form-field>
      <mat-slide-toggle [(ngModel)]="vouchersSearch.isConsumed">Is consumed?</mat-slide-toggle>
      <button color="primary" disabled="disabled" mat-icon-button>
        <mat-icon>receipt_long</mat-icon>
      </button>

      <button (click)="search()" mat-icon-button>
        <mat-icon>search</mat-icon>
      </button>
      <button (click)="resetSearch()" mat-icon-button>
        <mat-icon>close</mat-icon>
      </button>
    </mat-card-content>
  </mat-card>
  <app-crud (read)="read($event)" (create)="create()"
            [data]="vouchers" [deleteAction]="false" [updateAction]="false" [title]="title"></app-crud>
