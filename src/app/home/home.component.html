<mat-toolbar color="primary">
  <div>
    <mat-form-field appearance="fill" hideRequiredMarker="true">
      <mat-label><small>Description</small></mat-label>
      <input #code matInput placeholder="" required>
    </mat-form-field>
    <button (click)="search(code.value)" mat-icon-button>
      <mat-icon>pageview</mat-icon>
    </button>
  </div>
  <img alt="miw" src="../../assets/images/miw.png"/>
  <button mat-button routerLink="/home/adviser">
    <span>TPV</span>
  </button>
  <div>
    <button (click)="login()" *ngIf="!isAuthenticated()" mat-button>
      <mat-icon>person_outline</mat-icon>
      <span>Login</span>
    </button>
    <button (click)="logout()" *ngIf="isAuthenticated()" mat-button>
      <span>{{username}}</span>
      <mat-icon>person_outline</mat-icon>
      <span>Logout</span>
    </button>
    <button *ngIf="isAuthenticated()" [matMenuTriggerFor]="profile" mat-button>
      <mat-icon>account_box</mat-icon>
      <span>Profile</span>
    </button>
    <!--<button (click)="cart()" mat-button>routerLink=""-->
    <button mat-button routerLink="/home/shopping-basket">
      <mat-icon matBadge="3" matBadgeColor="accent" matBadgeOverlap="false" matBadgeSize="medium">shopping_cart
      </mat-icon>
    </button>
  </div>
</mat-toolbar>
<mat-menu #profile="matMenu" xPosition="before">
  <button mat-menu-item routerLink="/home/settings">
    <mat-icon>settings</mat-icon>
    <span>Settings</span>
  </button>
  <button mat-menu-item>
    <mat-icon>grade</mat-icon>
    <span>Reviews</span>
  </button>
  <button mat-menu-item routerLink="/home/online-orders">
    <mat-icon>shopping_basket</mat-icon>
    <span>Online Orders</span>
  </button>
  <button mat-menu-item routerLink="/home/refunds">
    <mat-icon>money_off</mat-icon>
    <span>Refunds</span>
  </button>
  <button mat-menu-item routerLink="/home/complaints">
    <mat-icon>sentiment_very_dissatisfied</mat-icon>
    <span>Complaints</span>
  </button>
  <button mat-menu-item>
    <mat-icon>build</mat-icon>
    <span>Technical Support</span>
  </button>
  <span mat-menu-item [disabled]="true">
    <mat-icon>monetization_on</mat-icon>
    <span>You have {{(customerPoints | async)?.value}} points</span>
  </span>

</mat-menu>
<mat-toolbar class="center">
  <button [matMenuTriggerFor]="adviser" mat-button>Adviser</button>
  <mat-menu #adviser="matMenu">
    <button mat-menu-item [routerLink]="['/home/adviser']" [queryParams]="{ tag: 'Sale' }">Sale</button>
    <button mat-menu-item [routerLink]="['/home/adviser']" [queryParams]="{ tag: 'Popular' }">Popular</button>
    <button mat-menu-item [routerLink]="['/home/adviser']" [queryParams]="{ tag: 'New' }">New</button>
  </mat-menu>
  <button mat-button><a class="noLinkStyle" routerLink="/home/top5">Top5</a></button>
</mat-toolbar>

<router-outlet></router-outlet>

<app-footer></app-footer>
