<h2 mat-dialog-title>{{ title }}</h2>
<mat-dialog-content>
  <mat-form-field class="full-width">
    <mat-label>User</mat-label>
    <input [(ngModel)]="customerDiscount.userMobile" matInput required type="text"/>
  </mat-form-field>
  <mat-form-field class="full-width">
    <mat-label>Note</mat-label>
    <input [(ngModel)]="customerDiscount.note" matInput type="text"/>
  </mat-form-field>
  <mat-form-field class="full-width">
    <mat-label>Registration Date</mat-label>
    <input [(ngModel)]="customerDiscount.registrationDate" matInput required type="date"/>
  </mat-form-field>
  <mat-form-field class="full-width">
    <mat-label>Discount (%)</mat-label>
    <input [(ngModel)]="customerDiscount.discount" matInput required type="number"/>
  </mat-form-field>
  <mat-form-field class="full-width">
    <mat-label>Minimum Purchase</mat-label>
    <input [(ngModel)]="customerDiscount.minimumPurchase" matInput required type="number"/>
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions>
  <button cdkFocusInitial mat-dialog-close mat-raised-button>Close</button>
  <button (click)="create()" *ngIf="isCreate()" [disabled]="invalid()" color="primary" mat-raised-button>Create</button>
  <button (click)="update()" *ngIf="!isCreate()" [disabled]="invalid()" color="primary" mat-raised-button>Update</button>
</mat-dialog-actions>
